// 1) GLASSMORPHISM
function GlassSection() {

            className="absolute rounded-full opacity-20"

              width: `${120 + i * 60}px`,

// 12) PARALLAX CARDS
function ParallaxSection() {
  const [rotate, setRotate] = React.useState({ x: 0, y: 0, id: null });
  const handleMouseMove = (e, id) => {
    const card = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - card.left) / card.width;
    const y = (e.clientY - card.top) / card.height;
    const rX = (y - 0.5) * 20;
    const rY = (x - 0.5) * -20;
    setRotate({ x: rX, y: rY, id });
  };
  return (
    <section className="py-20 px-6" style={{ background: "#0f172a", perspective: "1000px" }}>
      <div className="max-w-6xl mx-auto">
        <h2 className="text-center text-4xl font-bold text-white mb-16">🌌 Parallax Interaction</h2>
        <div className="grid gap-10 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">
          {plans.map((plan) => (
            <div
              key={plan.name}
              onMouseMove={(e) => handleMouseMove(e, plan.name)}
              onMouseLeave={() => setRotate({ x: 0, y: 0, id: null })}
              className="relative h-96 rounded-2xl transition-transform duration-200 ease-out"
              style={{
                transform: rotate.id === plan.name ? `rotateX(${rotate.x}deg) rotateY(${rotate.y}deg)` : "rotateX(0) rotateY(0)",
                transformStyle: "preserve-3d",
                background: "rgba(30, 41, 59, 0.5)",
                border: "1px solid rgba(255,255,255,0.1)",
              }}
            >
              <div className="absolute inset-0 p-8 flex flex-col items-center justify-center text-center" style={{ transform: "translateZ(50px)" }}>
                <div className="text-6xl mb-4 drop-shadow-2xl">{plan.icon}</div>
                <h3 className="text-2xl font-bold text-white mb-2">{plan.name}</h3>
                <div className="text-4xl font-black mb-6" style={{ color: plan.color }}>{plan.price}</div>
                <div className="text-xs text-slate-400 uppercase tracking-widest mb-8">Experiencia Inmersiva</div>
                <button className="px-6 py-2 rounded-full border-2 font-bold text-sm transition-colors" style={{ borderColor: plan.color, color: plan.color }}>Ver Detalles</button>
              </div>
              <div className="absolute inset-0 rounded-2xl opacity-20 pointer-events-none" style={{ background: `radial-gradient(circle at center, ${plan.color}, transparent)` }}></div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

];

          <button

              background: active === t.id ? "#fff" : "transparent",
              color: active === t.id ? "#111" : "#aaa",

      {active === "minimal" && <MinimalDarkSection />}
      {active === "clay" && <ClaySection />}
      {active === "material" && <MaterialSection />}
      {active === "swiss" && <SwissSection />}
